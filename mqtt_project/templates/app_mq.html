<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>📊 Real-Time Sensor Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f4f8fb;
        margin: 0;
        padding: 0;
        color: #1a237e;
    }

    header {
        text-align: center;
        background: linear-gradient(135deg, #1565c0, #42a5f5);
        color: white;
        padding: 35px 0;
        box-shadow: 0 5px 20px rgba(0,0,0,0.15);
    }
    header h1 { margin: 0; font-size: 2.4rem; }
    header p { margin: 8px 0 0; font-size: 1.1rem; color: #e3f2fd; }

    .controls {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 20px;
        margin: 25px 0;
        align-items: center;
    }

    select {
        padding: 8px 14px;
        font-size: 1rem;
        border-radius: 10px;
        border: 1px solid #90caf9;
        cursor: pointer;
        background: #e3f2fd;
        color: #0d47a1;
        transition: 0.3s;
    }
    select:hover { background: #bbdefb; }

    .table-container {
        padding: 20px;
        max-width: 1200px;
        margin: auto;
        overflow-x: auto;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }

    th, td { padding: 12px 15px; text-align: center; }
    th {
        background: linear-gradient(90deg, #42a5f5, #64b5f6);
        color: white;
        font-weight: bold;
        position: sticky;
        top: 0;
        z-index: 2;
    }

    tr:nth-child(even) { background: #f4f9ff; }
    tr:hover { background: #e3f2fd; transition: 0.2s; }

    .status-active { color: #2e7d32; font-weight: bold; }
    .status-inactive { color: #c62828; font-weight: bold; }

    .chart-container {
        max-width: 1000px;
        margin: 40px auto;
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        animation: fadeIn 1s ease-in-out;
    }

    .chart-title {
        font-weight: bold;
        font-size: 1.4rem;
        margin-bottom: 20px;
        text-align: center;
        color: #0d47a1;
    }

    footer {
        text-align: center;
        padding: 15px;
        font-size: 0.9rem;
        color: #607d8b;
        background: #e3f2fd;
        margin-top: 30px;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body>

<header>
    <h1>📊 MQTT Dashboard</h1>
    <p>🌐 Real-Time Sensor Dashboard</p>
</header>

<div class="controls">
    <label for="sensorFilter">🔍 Filter Sensor:</label>
    <select id="sensorFilter"><option value="All">All</option></select>

    <label for="numValues">📈 Show Last:</label>
    <select id="numValues">
        <option value="5" selected>5</option>
        <option value="10">10</option>
        <option value="20">20</option>
        <option value="50">50</option>
    </select>
</div>

<div class="table-container">
    <table id="sensor-table">
        <thead>
            <tr>
                <th>#️⃣</th>
                <th>Device ID</th>
                <th>Device Name</th>
                <th>IMEI</th>
                <th>Status</th>
                <th>Date & Time</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div class="chart-container">
    <div class="chart-title">📊 Latest Sensor Status Overview</div>
    <canvas id="sensorChart"></canvas>
</div>

<footer>© 2025 Smart IoT Dashboard </footer>

<script>
let sensorChart;
let sensorNames = [];
let sensorsData = {};
let selectedSensor = "All";
let numValues = parseInt(document.getElementById("numValues").value);

// ✅ โทนน้ำเงิน-ฟ้า (soft, professional)
const sensorColors = [
    'rgba(33, 150, 243, 0.8)',
    'rgba(3, 169, 244, 0.8)',
    'rgba(100, 181, 246, 0.8)',
    'rgba(129, 212, 250, 0.8)',
    'rgba(79, 195, 247, 0.8)',
    'rgba(25, 118, 210, 0.8)'
];

function statusClass(status){
    return (status==="Active"||status===true||status==="True") ? "status-active" : "status-inactive";
}

function statusEmoji(status){
    return (status==="Active"||status===true||status==="True") ? "✅ Active" : "❌ Inactive";
}

function statusToNumber(status){
    return (status==="Active"||status===true||status==="True") ? 1 : 0;
}

// ✅ ใช้ event.target ให้ filter ทำงานถูกต้อง
document.getElementById("sensorFilter").addEventListener("change", (event)=>{
    selectedSensor = event.target.value;
    updateTableAndChart();
});

document.getElementById("numValues").addEventListener("change", (event)=>{
    numValues = parseInt(event.target.value);
    updateTableAndChart();
});

async function fetchSensors(){
    const response = await fetch("/api/data");
    const sensors = await response.json();
    sensorsData = sensors;

    // เติม dropdown ครั้งแรก
    if(sensorNames.length === 0){
        sensorNames = Object.keys(sensors);
        const filter = document.getElementById("sensorFilter");
        sensorNames.forEach(name=>{
            const opt = document.createElement("option");
            opt.value = name;
            opt.innerText = name;
            filter.appendChild(opt);
        });
    }
}

function updateTableAndChart(){
    const tbody = document.querySelector("#sensor-table tbody");
    tbody.innerHTML = "";

    const displaySensors = (selectedSensor==="All") ? sensorNames : [selectedSensor];
    displaySensors.forEach((name)=>{
        const sensor = sensorsData[name];
        if(!sensor) return;
        const len = Math.min(sensor.status.length, numValues);
        const startIdx = sensor.status.length - len;  
        for(let i = startIdx; i < sensor.status.length; i++){
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${i+1}</td>
                <td>${sensor.device_id[i]||"N/A"}</td>
                <td>${name}</td>
                <td>${sensor.imei[i]||"N/A"}</td>
                <td class="${statusClass(sensor.status[i])}">${statusEmoji(sensor.status[i])}</td>
                <td>${sensor.datetime[i]}</td>
            `;
            tbody.appendChild(row);
        }
    });

    
    const labels = displaySensors;
    const dataValues = labels.map((name)=>{
        const sensor = sensorsData[name];
        if(!sensor) return 0;
        return statusToNumber(sensor.status[sensor.status.length-1]);
    });

    if(!sensorChart){
        const ctx = document.getElementById("sensorChart").getContext("2d");
        sensorChart = new Chart(ctx,{
            type:'bar',
            data:{
                labels:labels,
                datasets:[{
                    label:'Latest Status',
                    data:dataValues,
                    backgroundColor: labels.map((_,i)=>sensorColors[i % sensorColors.length]),
                    borderRadius: 8
                }]
            },
            options:{
                indexAxis:'x',
                responsive:true,
                plugins:{
                    legend:{display:false},
                    tooltip:{callbacks:{
                        label:function(ctx){
                            return ctx.dataset.label+": "+(ctx.raw === 1 ? "✅ Active" : "❌ Inactive");
                        }
                    }}
                },
                scales:{
                    y:{min:0,max:1,ticks:{stepSize:1}, title:{display:true,text:'Status (0=Inactive,1=Active)'}},
                    x:{title:{display:true,text:'Sensor'}}
                },
                animation:{duration:1000,easing:'easeOutQuart'}
            }
        });
    } else {
        sensorChart.data.labels = labels;
        sensorChart.data.datasets[0].data = dataValues;
        sensorChart.data.datasets[0].backgroundColor = labels.map((_,i)=>sensorColors[i % sensorColors.length]);
        sensorChart.update();
    }
}

async function refreshData(){
    await fetchSensors();
    updateTableAndChart();
}

refreshData();
setInterval(refreshData, 3000);
</script>

</body>
</html>
