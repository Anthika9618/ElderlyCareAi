<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎥 Camera Playback</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #e5e7eb;
        margin: 0;
        padding: 0;
    }

    .container {
        max-width: 800px;
        margin: 40px auto;
        padding: 30px;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }

    h2 {
        text-align: center;
        color: #1f2937;
        margin-bottom: 30px;
        font-size: 28px;
    }

    form {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 15px 20px;
        align-items: center;
    }

    label {
        font-weight: 600;
        color: #374151;
        font-size: 16px;
    }

    input[type="text"], input[type="password"], input[type="number"], input[type="date"], input[type="time"] {
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        width: 100%;
        box-sizing: border-box;
        transition: border-color 0.3s, box-shadow 0.3s;
    }

    input:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 5px rgba(59,130,246,0.4);
        outline: none;
    }

    /* ปรับปุ่ม Playback ให้สั้นลง */
    .playback-btn {
        grid-column: 1 / span 2;
        width: 160px;
        padding: 10px 20px;
        margin: 0 auto;
        background: linear-gradient(90deg, #3b82f6, #60a5fa);
        color: #fff;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 12px rgba(59,130,246,0.3);
    }

    .playback-btn:hover {
        background: linear-gradient(90deg, #2563eb, #3b82f6);
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(37,99,235,0.4);
    }

    .playback-result {
        margin-top: 40px;
        text-align: center;
    }

    .playback-result h3::before {
        content: "📺 ";
        font-size: 20px;
    }

    .playback-result img {
        width: 100%;
        max-width: 780px;
        border-radius: 12px;
        border: 1px solid #d1d5db;
        margin-top: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    @media (max-width: 650px) {
        form {
            grid-template-columns: 1fr;
        }

        .playback-btn {
            grid-column: 1;
            width: 100%;
        }
    }
</style>
</head>
<body>
<div class="container">
    <h2>🎬 Camera Playback</h2>
    <form id="playbackForm">
        <label>🌐 IP Address:</label>
        <input type="text" id="ip" placeholder="เช่น 192.168.1.100" required>

        <label>👤 User:</label>
        <input type="text" id="user" placeholder="ชื่อผู้ใช้" required>

        <label>🔑 Password:</label>
        <input type="password" id="pwd" placeholder="รหัสผ่าน" required>

        <label>📺 Channel:</label>
        <input type="number" id="channel" value="1" min="1" required>

        <label>🔄 Subtype:</label>
        <input type="number" id="subtype" value="1" min="1" required>

        <label>📅 Date:</label>
        <input type="date" id="date" required>

        <label>⏱ Start Time:</label>
        <input type="time" id="start" required>

        <label>⏱ End Time:</label>
        <input type="time" id="end" required>

        <button type="button" class="playback-btn" onclick="play()">▶️ Play</button>
    </form>

    <div class="playback-result">
        <h3>Playback Result</h3>
        <img id="playbackVideo" src="" alt="Video Stream">
    </div>
</div>

<script>
function play() {
    const ip = document.getElementById("ip").value;
    const user = document.getElementById("user").value;
    const pwd = document.getElementById("pwd").value;
    const channel = document.getElementById("channel").value;
    const subtype = document.getElementById("subtype").value;
    const date = document.getElementById("date").value;
    const start = document.getElementById("start").value;
    const end = document.getElementById("end").value;

    const url =
        `/video_feed_playback?ip=${encodeURIComponent(ip)}` +
        `&user=${encodeURIComponent(user)}` +
        `&pwd=${encodeURIComponent(pwd)}` +
        `&channel=${channel}` +
        `&subtype=${subtype}` +
        `&date=${date}` +
        `&start=${start}` +
        `&end=${end}`;

    document.getElementById("playbackVideo").src = url;
}
</script>
</body>
</html>
