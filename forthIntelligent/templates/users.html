<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👑 User Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    .navbar-custom {
      background-color: #006064;
      color: white;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 8px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-name {
      font-weight: 500;
      background: rgba(255, 255, 255, 0.15);
      padding: 6px 12px;
      border-radius: 20px;
    }

    .btn-room {
      background-color: #00796b;
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 6px;
    }

    .btn-room:hover {
      background-color: #009688;
    }

    #login-section {
      margin-top: 100px;
    }

    #login-section .form-control:focus {
      border-color: #1976d2;
      box-shadow: 0 0 8px rgba(25, 118, 210, 0.3);
    }

    #login-section .btn:hover {
      background-color: #1976d2;
    }
  </style>
</head>

<body class="bg-light">
  <div class="container py-5">

    <!-- LOGIN -->
    <div id="login-section" class="card mx-auto shadow-lg" style="max-width: 400px; border-radius: 15px;">
      <div class="card-body p-4" style="background: linear-gradient(145deg, #e3f2fd, #ffffff);">
        <h4 class="card-title text-center mb-4" style="color: #0d47a1;">🔐 Login</h4>
        <form id="loginForm">
          <div class="mb-3">
            <label style="color: #0d47a1;">👤 Username</label>
            <input type="text" class="form-control" name="username" placeholder="Enter username" required
              style="border-radius: 10px;">
          </div>
          <div class="mb-3">
            <label style="color: #0d47a1;">🔑 Password</label>
            <input type="password" class="form-control" name="password" placeholder="Enter password" required
              style="border-radius: 10px;">
          </div>
          <button type="submit" class="btn w-100"
            style="background-color: #0d47a1; color: white; border-radius: 10px;">Login ➤</button>
        </form>
      </div>
    </div>


    <!-- USER MANAGEMENT -->
    <div id="user-section" class="d-none">

      <!-- Navbar -->
      <div class="navbar-custom mb-4">
        <h4 class="m-0">👑 User Management </h4>
        <div class="user-info">
          <span class="user-name" id="userDisplay">Loading...</span>
          <button class="btn-room" id="roomBtn" style="display:none;">🏠 Room Config</button>
          <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
        </div>
      </div>

      <div class="d-flex justify-content-between mb-3">
        <h5>Manage Users</h5>
        <button class="btn btn-success" id="btnAddUser">📝 Add User</button>
      </div>

      <table class="table table-striped table-bordered" id="userTable">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Full Name</th>
            <th>Role</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content" style="border-radius:16px; box-shadow:0 8px 20px rgba(0,0,0,0.2);">
        <form id="userForm">
          <div class="modal-header"
            style="background: linear-gradient(45deg,#03a9f4,#0288d1); color:white; border-top-left-radius:16px; border-top-right-radius:16px;">
            <h5 class="modal-title" id="modalTitle">📝 Add User</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" style="filter:invert(1);"></button>
          </div>
          <div class="modal-body" style="background-color:#f8fbff;">
            <input type="hidden" id="user_id">
            <div class="mb-3">
              <label>👤 Username</label>
              <input type="text" class="form-control" id="username" required placeholder="Enter username...">
            </div>
            <div class="mb-3">
              <label>🔒 Password</label>
              <input type="password" class="form-control" id="password" placeholder="Enter password...">
            </div>
            <div class="mb-3">
              <label>🧑‍💼 Full Name</label>
              <input type="text" class="form-control" id="full_name" required placeholder="Enter full name...">
            </div>
            <div class="mb-3">
              <label>🎯 Role</label>
              <select class="form-select" id="role">
                <option value="user">👥 User</option>
                <option value="admin">🛡️ Administrator</option>
              </select>
            </div>
          </div>
          <div class="modal-footer" style="background-color:#f1faff; border-top:1px solid #e0f0ff;">
            <button type="submit" class="btn btn-primary"
              style="border-radius:10px; background: linear-gradient(45deg,#03a9f4,#0288d1); border:none;">💾
              Save</button>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" style="border-radius:10px;">❌
              Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const loginForm = document.getElementById('loginForm');
    const loginSection = document.getElementById('login-section');
    const userSection = document.getElementById('user-section');
    let users = [];
    let currentUser = null;

    const adminAccounts = [
      { username: 'adminForth1', password: 'Forth123' },
      { username: 'adminForth2', password: 'Forth456' },
      { username: 'adminForth3', password: 'Forth789' }
    ];

    const userModal = new bootstrap.Modal(document.getElementById('userModal'));

    // โหลด Users จาก DB
    async function loadUsersFromDB() {
      try {
        const res = await fetch('/users');
        users = await res.json();
        renderUserTable();
      } catch (err) {
        console.error(err);
        Swal.fire('Error', 'Failed to load users', 'error');
      }
    }

    // แสดงตารางผู้ใช้
    function renderUserTable() {
      const tbody = document.querySelector('#userTable tbody');
      tbody.innerHTML = '';

      users.forEach(user => {
        const isPrimaryAdmin = adminAccounts.some(a => a.username === user.username);

        let showActions = false;

        if (currentUser.role === 'admin') {
          if (isPrimaryAdmin && currentUser.username === user.username) {
            showActions = false;
          } else {
            showActions = true;
          }
        } else {
          showActions = false;
        }

        const tr = document.createElement('tr');
        tr.innerHTML = `
      <td>${user.user_id}</td>
      <td>${user.username}</td>
      <td>${user.full_name}</td>
      <td>${user.role}</td>
      <td>
        ${showActions ? `
          <button class="btn btn-sm btn-info me-1" onclick="editUser(${user.user_id})">Edit</button>
          <button class="btn btn-sm btn-danger" onclick="deleteUser(${user.user_id})">Delete</button>
        ` : (isPrimaryAdmin ? 'Admin' : '')}
      </td>
    `;
        tbody.appendChild(tr);
      });
    }

    // Login Event
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = loginForm.username.value;
      const password = loginForm.password.value;

      // แสดง SweetAlert Loading
      Swal.fire({
        title: 'Logging in…',
        text: 'Please wait 🔄',
        allowOutsideClick: false,
        didOpen: () => {
          Swal.showLoading();
        }
      });

      const isAdmin = adminAccounts.some(a => a.username === username && a.password === password);
      try {
        if (isAdmin) {
          currentUser = { username, role: 'admin' };
          await loadUsersFromDB(); // โหลดผู้ใช้ก่อนปิด loading
          Swal.close(); // ปิด loading
          Swal.fire('Success', 'Login successfully as Admin!', 'success');
          loginSection.classList.add('d-none');
          userSection.classList.remove('d-none');
          document.getElementById('userDisplay').textContent = `${username} (Administrator)`;
          document.getElementById('roomBtn').style.display = 'inline-block';
        } else {
          const res = await fetch('/users');
          const dbUsers = await res.json();
          const user = dbUsers.find(u => u.username === username && u.password === password);

          if (user) {
            currentUser = { username: user.username, role: user.role };
            Swal.close(); // ปิด loading
            Swal.fire('Success', 'Login successfully!', 'success');

            if (user.role === 'admin') {
              loginSection.classList.add('d-none');
              userSection.classList.remove('d-none');
              document.getElementById('userDisplay').textContent = `${user.full_name} (Administrator)`;
              document.getElementById('roomBtn').style.display = 'inline-block';
              await loadUsersFromDB();
            } else {
              // Redirect ไปหน้า room_config.html สำหรับ role user
              window.location.href = '/room_config';
            }
          } else {
            Swal.close();
            Swal.fire('Error', 'Invalid credentials!', 'error');
          }
        }
      } catch (err) {
        Swal.close();
        console.error(err);
        Swal.fire('Error', 'Server error', 'error');
      }
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
      Swal.fire({
        title: 'Logout?',
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'Yes',
        cancelButtonText: 'Cancel'
      }).then(res => {
        if (res.isConfirmed) {
          loginSection.classList.remove('d-none');
          userSection.classList.add('d-none');
          currentUser = null;
          loginForm.reset();
        }
      });
    });

    // ปุ่ม Room Config
    document.getElementById('roomBtn').addEventListener('click', () => {
      window.location.href = '/room_config';
    });

    // Add/Edit/Delete เหมือนเดิม
    document.getElementById('btnAddUser').addEventListener('click', () => {
      document.getElementById('modalTitle').innerText = 'Add User';
      document.getElementById('userForm').reset();
      document.getElementById('user_id').value = '';
      userModal.show();
    });

    async function editUser(id) {
      const user = users.find(u => u.user_id == id);
      if (!user) return;

      const isPrimaryAdmin = adminAccounts.some(a => a.username === user.username);

      if (isPrimaryAdmin && currentUser.username === user.username) return;

      Swal.fire({
        title: id ? 'Updating user...' : 'Adding new user...',
        text: 'Please wait',
        allowOutsideClick: false,
        background: '#ffffff',
        color: '#111111',
        didOpen: () => Swal.showLoading(),
      });


      setTimeout(() => {
        Swal.close();
        document.getElementById('modalTitle').innerText = '✏️ Edit User';
        document.getElementById('user_id').value = user.user_id;
        document.getElementById('username').value = user.username;
        document.getElementById('password').value = '';
        document.getElementById('full_name').value = user.full_name;
        document.getElementById('role').value = user.role;
        userModal.show();
      }, 900);
    }

    document.getElementById('userForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const id = document.getElementById('user_id').value;
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const full_name = document.getElementById('full_name').value;
      const role = document.getElementById('role').value;

      const { value: adminPassword } = await Swal.fire({
        title: 'Admin Verification 🔐',
        input: 'password',
        inputLabel: 'Please confirm your admin password',
        inputPlaceholder: 'Enter admin password',
        inputAttributes: { autocapitalize: 'off', autocorrect: 'off' },
        showCancelButton: true,
        confirmButtonColor: '#0d47a1',
        confirmButtonText: 'Confirm',
        cancelButtonText: 'Cancel',
        preConfirm: (pass) => {
          const adminAcc = adminAccounts.find(a => a.username === currentUser.username);
          if (!adminAcc || adminAcc.password !== pass) {
            Swal.showValidationMessage('❌ Incorrect admin password');
            return false;
          }
        }
      });

      if (!adminPassword) return;

      Swal.fire({
        title: id ? 'Updating user...' : 'Adding new user...',
        text: 'Please wait',
        allowOutsideClick: false,
        background: '#f0f8ff',
        color: '#0d47a1',
        didOpen: () => Swal.showLoading(),
      });

      try {
        if (id) {
          await fetch(`/update_user/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, full_name, role })
          });
          Swal.fire({
            icon: 'success',
            title: '✅ User updated successfully!',
            showConfirmButton: false,
            timer: 1500,
            background: '#e3f2fd',
          });
        } else {
          await fetch('/add_user', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, full_name, role })
          });
          Swal.fire({
            icon: 'success',
            title: '🎉 User added successfully!',
            showConfirmButton: false,
            timer: 1500,
            background: '#e3f2fd',
          });
        }

        userModal.hide();
        await loadUsersFromDB();
      } catch (err) {
        console.error(err);
        Swal.fire({
          icon: 'error',
          title: '❌ Failed to save user',
          text: 'Please try again later.',
          background: '#ffebee',
        });
      }
    });


    document.getElementById('userForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('user_id').value;
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const full_name = document.getElementById('full_name').value;
      const role = document.getElementById('role').value;

      try {
        if (id) {
          await fetch(`/update_user/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, full_name, role })
          });
          Swal.fire('Success', 'User updated!', 'success');
        } else {
          await fetch('/add_user', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, full_name, role })
          });
          Swal.fire('Success', 'User added!', 'success');
        }
        userModal.hide();
        await loadUsersFromDB();
      } catch (err) {
        console.error(err);
        Swal.fire('Error', 'Failed to save user', 'error');
      }
    });

    async function deleteUser(id) {
      const user = users.find(u => u.user_id === id);
      const isPrimaryAdmin = adminAccounts.some(a => a.username === user.username);
      if (isPrimaryAdmin && currentUser.username === user.username) return;

      Swal.fire({
        title: 'Delete user?',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Yes',
        cancelButtonText: 'Cancel'
      }).then(async res => {
        if (res.isConfirmed) {
          try {
            await fetch(`/delete_user/${id}`, { method: 'DELETE' });
            Swal.fire('Deleted!', 'User removed', 'success');
            await loadUsersFromDB();
          } catch (err) {
            console.error(err);
            Swal.fire('Error', 'Failed to delete user', 'error');
          }
        }
      });
    }
  </script>
</body>

</html>
